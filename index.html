<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HostelScan Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
</head>
<body class="bg-slate-100 p-4">
  <div class="max-w-4xl mx-auto">
    <div class="bg-white p-5 rounded-2xl shadow-lg mb-6">
      <h1 class="text-lg font-bold text-center mb-4">HOSTELSCAN PRO v4.0</h1>
      <div id="reader" class="w-full mb-4"></div>
      <div class="flex gap-2">
        <button onclick="statusSemasa='MASUK'" class="flex-1 py-2 bg-emerald-600 text-white rounded-lg font-bold">MASUK</button>
        <button onclick="statusSemasa='KELUAR'" class="flex-1 py-2 bg-red-600 text-white rounded-lg font-bold">KELUAR</button>
      </div>
    </div>
    <div class="bg-white p-5 rounded-2xl shadow-lg">
      <button onclick="tapis('TIDAK HADIR')" class="bg-red-600 text-white px-4 py-2 rounded-lg text-xs font-bold mb-4">Belum Hadir Sahaja</button>
      <table class="w-full text-left text-sm">
        <tbody id="jadual-utama"></tbody>
      </table>
    </div>
  </div>

  <script>
    let statusSemasa = "MASUK";
    const urlAPI = "https://script.google.com/macros/s/AKfycbzjx7uH6hX4IUV6c2D716uAhDWYHJ7XCHdsSBucoX8HOxhMiggk0hC0BZms-bA6EqVH/exec";

    const scanner = new Html5Qrcode("reader");
    scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (id) => {
      fetch(urlAPI, { method: "POST", body: JSON.stringify({ idPelajar: id, arahPergerakan: statusSemasa }) })
      .then(() => { new Audio('https://actions.google.com/sounds/v1/ui/beep.ogg').play(); muatData(); });
    });

    function muatData() {
      fetch(`${urlAPI}?tarikh=${new Date().toISOString().split('T')[0]}`)
      .then(res => res.json()).then(res => {
        const tbody = document.getElementById("jadual-utama");
        tbody.innerHTML = res.data.map(p => `
          <tr class="border-b">
            <td class="p-2">${p.nama}</td>
            <td class="p-2">${p.tingkatan}</td>
            <td class="p-2"><span class="px-2 py-1 rounded-full text-[10px] font-bold ${p.status=='Hadir'?'bg-emerald-100':p.status=='Keluar'?'bg-blue-100':'bg-red-100'}">${p.status.toUpperCase()}</span></td>
          </tr>`).join('');
      });
    }

    function tapis(f) {
      document.querySelectorAll('#jadual-utama tr').forEach(r => {
        r.style.display = (f=='SEMUA' || r.querySelector('span').innerText==f) ? '' : 'none';
      });
    }
    
    setInterval(muatData, 30000);
    window.onload = muatData;
  </script>
</body>
</html>
