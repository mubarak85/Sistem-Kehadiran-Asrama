<!DOCTYPE html>
<html>
<head>
    <base target="_top">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f7f6; text-align: center; }
        .container { max-width: 450px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .btn { padding: 12px 20px; margin: 5px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        #reader { width: 100%; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Sistem Asrama</h2>
        <button class="btn" onclick="tukarMod('scan')">Guna Kamera</button>
        <button class="btn" onclick="tukarMod('manual')">Taip Manual</button>
        
        <div style="margin: 20px 0;">
            <button class="btn" style="background:#e74c3c; color:white;" onclick="setStatus('Keluar')">KELUAR</button>
            <button class="btn" style="background:#27ae60; color:white;" onclick="setStatus('Masuk')">MASUK</button>
            <p><strong>Status: <span id="sLabel">Tiada</span></strong></p>
        </div>

        <div id="scanMod"><div id="reader"></div></div>
        <div id="manualMod" style="display:none;">
            <input type="text" id="manualID" placeholder="Taip ID Pelajar...">
            <button class="btn" style="background:#3498db; color:white;" onclick="prosesManual()">Hantar</button>
        </div>
    </div>

    <script>
        let selectedStatus = "";
        let scanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });

        function setStatus(s) { selectedStatus = s; document.getElementById("sLabel").innerText = s; }
        
        function tukarMod(m) {
            document.getElementById('scanMod').style.display = (m === 'scan') ? 'block' : 'none';
            document.getElementById('manualMod').style.display = (m === 'manual') ? 'block' : 'none';
            if(m === 'scan') scanner.render(hantarKeSheet);
        }

        function prosesManual() {
            let id = document.getElementById('manualID').value;
            hantarKeSheet(id);
        }

        function hantarKeSheet(id) {
            if(!selectedStatus) { alert("Pilih status dahulu!"); return; }
            if(!id) { alert("Sila masukkan ID!"); return; }
            
            // TUKAR URL INI DENGAN URL WEB APP ANDA
            const url = "https://script.google.com/macros/s/AKfycbx6K0d_pqYiBXw8ph3s_uSVur6bFrNKAuXir2nCmmgU_SFZCV-s4JuvSHFDOqt9_NsGRQ/exec";
            
            fetch(url, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ studentID: id, status: selectedStatus })
            })
            .then(() => {
                alert("Berjaya! ID: " + id + " [" + selectedStatus + "]");
                document.getElementById('manualID').value = "";
            })
            .catch(err => {
                alert("Data telah dihantar ke server.");
            });
        }
    </script>
</body>
</html>
