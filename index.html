<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>HostelScan Pro v3.2 - Eksport Rekod Ponteng</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
  <style>
    @media print {
      body { background: white; color: black; padding: 0; }
      #elemen-cetak-padam, .lg\:col-span-5, #kad-tarikh, #kad-analisa, #kad-ringkasan, .butang-aksi { display: none !important; }
      .lg\:col-span-7 { width: 100% !important; }
      #kad-belum-masuk { border: none !important; box-shadow: none !important; }
      .tabel-cetak { border: 1px solid #000 !important; }
    }
    #reader video { object-fit: cover !important; width: 100% !important; height: 100% !important; }
  </style>
</head>
<body class="bg-slate-100 font-sans min-h-screen p-4 lg:p-6">
  <div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6 items-start">
    <div class="lg:col-span-5 bg-white rounded-2xl shadow-xl overflow-hidden w-full">
      <div class="bg-blue-600 p-5 text-white text-center relative">
        <h1 class="text-xl font-bold tracking-wide">HOSTELSCAN PRO v3.2</h1>
        <button id="btn-tukar-kamera" onclick="tukarKamera()" class="hidden absolute right-4 top-1/2 -translate-y-1/2 bg-white/20 hover:bg-white/30 text-white p-2 rounded-full text-xs border border-white/30">🔄</button>
      </div>
      <div id="elemen-cetak-padam" class="p-4 bg-slate-50 border-b border-slate-200 flex gap-2">
        <button id="tab-masuk" onclick="setModPergerakan('MASUK')" class="w-full py-2.5 rounded-xl font-bold text-sm bg-emerald-600 text-white shadow-md text-center cursor-pointer">📥 DAFTAR MASUK</button>
        <button id="tab-keluar" onclick="setModPergerakan('KELUAR')" class="w-full py-2.5 rounded-xl font-bold text-sm bg-white text-slate-600 border border-slate-200 text-center cursor-pointer">📤 BALIK / OUTING</button>
      </div>
      <div class="p-5 space-y-4">
        <div id="bingkai-kamera" class="relative w-full rounded-xl overflow-hidden bg-black min-h-[280px] border-2 border-emerald-500 shadow-sm flex items-center justify-center">
          <div id="reader" class="w-full h-full"></div>
          <div id="overlay-mula" class="absolute inset-0 bg-slate-900 flex flex-col items-center justify-center z-50">
            <button onclick="mulaKameraGitHub()" class="bg-emerald-600 text-white font-bold py-3 px-6 rounded-xl cursor-pointer">📷 Aktifkan Kamera</button>
          </div>
        </div>
      </div>
      <div class="p-5 border-t border-slate-100 bg-slate-50/50">
        <div id="notifikasi-badge" class="hidden text-center py-2 rounded-full font-bold text-sm mb-3"></div>
        <div id="kotak-maklumat" class="hidden space-y-2 bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
          <div class="grid grid-cols-3 text-sm"><span class="text-gray-400">Nama</span><span class="col-span-2 font-bold" id="data-nama">-</span></div>
          <div class="grid grid-cols-3 text-sm"><span class="text-gray-400">Dorm</span><span class="col-span-2 font-bold text-blue-600" id="data-dorm">-</span></div>
        </div>
      </div>
    </div>

    <div class="lg:col-span-7 space-y-6">
      <div id="kad-tarikh" class="bg-white p-4 rounded-2xl shadow-xl flex justify-between items-center">
        <h3 class="font-bold text-sm">Tarikh Rujukan</h3>
        <input type="date" id="pilih-tarikh" onchange="muatNaikStatistik()" class="border rounded-xl px-3 py-1.5 text-sm">
      </div>
      
      <div id="kad-belum-masuk" class="bg-white p-6 rounded-2xl shadow-xl">
        <h2 id="tajuk-jadual" class="font-bold text-red-600 text-base mb-4">⚠️ Senarai Pelajar Belum Masuk</h2>
        <div class="overflow-x-auto">
          <table class="w-full text-left">
            <thead><tr class="bg-slate-100 text-xs uppercase font-bold text-slate-600"><th class="p-3">Nama</th><th class="p-3 text-center">Ting</th><th class="p-3 text-center">Dorm</th><th class="p-3 text-center">Status</th></tr></thead>
            <tbody id="jadual-belum-masuk" class="text-sm divide-y"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script>
    let html5QrCode;
    let sedangMemproses = false;
    let statusSemasaArah = localStorage.getItem('modTerakhir') || "MASUK";
    let dataGlobalPelajar = [];
    const urlAPI = "https://script.google.com/macros/s/AKfycbzjx7uH6hX4IUV6c2D716uAhDWYHJ7XCHdsSBucoX8HOxhMiggk0hC0BZms-bA6EqVH/exec";

    window.onload = function() {
      document.getElementById('pilih-tarikh').value = new Date().toISOString().split('T')[0];
      setModPergerakan(statusSemasaArah);
      muatNaikStatistik();
      setInterval(() => { if (!sedangMemproses) muatNaikStatistik(); }, 30000);
    };

    function mainkanBunyi(jenis) {
      try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.connect(gainNode); gainNode.connect(audioCtx.destination);
        osc.frequency.value = (jenis === 'success') ? 800 : 300;
        gainNode.gain.value = 0.1;
        osc.start(); osc.stop(audioCtx.currentTime + 0.2);
      } catch (e) {}
    }

    function setModPergerakan(arah) {
      statusSemasaArah = arah;
      localStorage.setItem('modTerakhir', arah);
      document.getElementById("tajuk-jadual").innerText = (arah === "MASUK") ? "⚠️ Senarai Pelajar Belum Masuk" : "🏃 Senarai Pelajar Sedang Keluar";
      
      const tabMasuk = document.getElementById("tab-masuk");
      const tabKeluar = document.getElementById("tab-keluar");
      const bingkai = document.getElementById("bingkai-kamera");
      
      if (arah === "MASUK") {
        tabMasuk.className = "w-full py-2.5 rounded-xl font-bold text-sm bg-emerald-600 text-white shadow-md text-center cursor-pointer";
        tabKeluar.className = "w-full py-2.5 rounded-xl font-bold text-sm bg-white text-slate-600 border border-slate-200 text-center cursor-pointer";
        bingkai.style.borderColor = "#10b981";
      } else {
        tabKeluar.className = "w-full py-2.5 rounded-xl font-bold text-sm bg-red-600 text-white shadow-md text-center cursor-pointer";
        tabMasuk.className = "w-full py-2.5 rounded-xl font-bold text-sm bg-white text-slate-600 border border-slate-200 text-center cursor-pointer";
        bingkai.style.borderColor = "#ef4444";
      }
      muatNaikStatistik();
    }

    function muatNaikStatistik() {
      const tarikh = document.getElementById("pilih-tarikh").value;
      fetch(urlAPI + "?tarikh=" + tarikh).then(res => res.json()).then(data => {
        if(data.status === "SUCCESS") {
          dataGlobalPelajar = data.belumMasuk || [];
          const tbody = document.getElementById("jadual-belum-masuk");
          tbody.innerHTML = "";
          
          const filtered = dataGlobalPelajar.filter(p => statusSemasaArah === "MASUK" ? p.statusTerakhir === "KELUAR" : p.statusTerakhir === "MASUK");
          
          filtered.forEach(p => {
            tbody.innerHTML += `<tr><td class="p-3 font-semibold">${p.nama}</td><td class="p-3 text-center">${p.tingkatan}</td><td class="p-3 text-center">${p.dorm}</td><td class="p-3 text-center"><span class="text-[10px] px-2 py-0.5 rounded font-bold uppercase ${p.statusTerakhir === "KELUAR" ? "bg-red-100 text-red-800" : "bg-emerald-100 text-emerald-800"}">${p.statusTerakhir}</span></td></tr>`;
          });
        }
      });
    }

    function prosesPenghantaranData(idDitemui) {
      if (sedangMemproses) return;
      sedangMemproses = true;
      fetch(urlAPI, { method: "POST", body: JSON.stringify({ idPelajar: idDitemui, arahPergerakan: statusSemasaArah }) })
      .then(res => res.json()).then(data => {
        if (data.status === "SUCCESS") {
          mainkanBunyi('success');
          document.getElementById("data-nama").innerText = data.nama;
          document.getElementById("data-dorm").innerText = data.dorm;
          document.getElementById("kotak-maklumat").classList.remove("hidden");
          muatNaikStatistik();
        } else {
          mainkanBunyi('error');
        }
        setTimeout(() => { sedangMemproses = false; }, 2000);
      });
    }

    function mulaKameraGitHub() { document.getElementById('overlay-mula').style.display = 'none'; html5QrCode = new Html5Qrcode("reader"); html5QrCode.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, (text) => { if(!sedangMemproses) prosesPenghantaranData(text.trim()); }); }
    function tukarKamera() { if(html5QrCode) { html5QrCode.stop().then(() => mulaKameraGitHub()); } }
  </script>
</body>
</html>
