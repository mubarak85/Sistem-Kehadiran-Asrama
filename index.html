<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Kehadiran Asrama</title>
    <!-- Library untuk QR Scanner -->
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f4f7f6; 
            text-align: center; 
            padding: 20px; 
            margin: 0;
        }
        .container { 
            max-width: 500px; 
            margin: auto; 
            background: white; 
            padding: 20px; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
        }
        h2 { color: #2c3e50; margin-bottom: 20px; }
        #reader { width: 100%; border-radius: 15px; overflow: hidden; }
        .controls { margin-top: 25px; }
        button { 
            padding: 15px 30px; 
            margin: 10px; 
            border: none; 
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 16px;
            transition: 0.3s; 
        }
        .btn-keluar { background-color: #e74c3c; color: white; }
        .btn-masuk { background-color: #27ae60; color: white; }
        button:hover { opacity: 0.8; transform: scale(1.05); }
        #currentStatus { color: #2980b9; font-size: 1.2em; display: block; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Sistem Keluar/Masuk Asrama</h2>
        <div id="reader"></div>

        <div class="controls">
            <button class="btn-keluar" onclick="setStatus('Keluar')">KELUAR</button>
            <button class="btn-masuk" onclick="setStatus('Masuk')">MASUK</button>
            <span id="currentStatus">Status: Sila pilih status</span>
        </div>
    </div>

    <script>
        let selectedStatus = "";

        function setStatus(status) {
            selectedStatus = status;
            document.getElementById("currentStatus").innerText = "Status: " + status;
            document.getElementById("currentStatus").style.color = (status === 'Keluar' ? '#e74c3c' : '#27ae60');
        }

        function onScanSuccess(decodedText, decodedResult) {
            if (!selectedStatus) {
                alert("Sila tekan butang KELUAR atau MASUK terlebih dahulu!");
                return;
            }

            // Hantar data ke Google Sheets
            hantarKeSheet(decodedText, selectedStatus);
        }

        function hantarKeSheet(id, status) {
            const url = "https://script.google.com/macros/s/AKfycbxZ8KDLESOAlcEhxknwzXFGMd-doIEdB6e2HTv0DpnuFGOITYgw70cE1Ze55DqgMRzHcQ/exec"; 

            fetch(url, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ studentID: id, status: status, nama: "Pelajar" })
            }).then(() => {
                alert("Berjaya direkod: " + id + " [" + status + "]");
            }).catch(err => {
                alert("Ralat berlaku. Sila cuba lagi.");
            });
        }

        let html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
        html5QrcodeScanner.render(onScanSuccess);
    </script>
</body>
</html>
